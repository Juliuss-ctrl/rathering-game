<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload – Rathering Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .wrap { position:relative;z-index:1;width:100%;max-width:560px;padding:24px;margin:auto;display:flex;flex-direction:column;gap:20px;min-height:100vh;justify-content:center; }
    #upload-status { font-size:0.85rem;color:var(--text2);text-align:center;min-height:20px; }
    .players-card { padding:20px; }
    #upload-progress { display:flex;flex-wrap:wrap;gap:8px;margin-top:10px; }
    .actions { display:flex;flex-direction:column;gap:8px;margin-top:12px; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrap">
  <div class="fade-in">
    <div class="badge" style="margin-bottom:14px;"><span class="dot"></span>Upload Phase</div>
    <h1 class="title-lg">Dein<br>Battle-Bild</h1>
  </div>

  <div class="glass-card fade-in" style="padding:28px;animation-delay:0.1s;display:flex;flex-direction:column;gap:18px;">
    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
      <div style="font-size:2.2rem;margin-bottom:10px;">🖼️</div>
      <div style="font-weight:600;color:var(--text);margin-bottom:4px;">Foto auswählen</div>
      <div class="sub" style="font-size:0.82rem;">JPG, PNG, GIF — wird quadratisch zugeschnitten</div>
      <img id="preview-img" src="" alt="" style="display:none;max-width:100%;max-height:200px;object-fit:contain;border-radius:10px;margin-top:14px;">
    </div>

    <div class="input-group">
      <label class="label">Beschreibung (optional)</label>
      <input class="input" id="img-desc" type="text" placeholder="z.B. Ich beim Surfen…" maxlength="60" autocomplete="off">
    </div>

    <div id="upload-status"></div>

    <button class="btn btn-primary btn-full" onclick="submitUpload()" id="btn-submit">Fertig →</button>
  </div>

  <div class="glass-card players-card fade-in" id="players-status" style="display:none;animation-delay:0.15s;">
    <div class="label">Spieler-Status</div>
    <div id="upload-progress"></div>
    <div class="actions">
      <button class="btn btn-primary btn-full" id="btn-start-battle" style="display:none;" onclick="startBattle()">⚔️ Battle starten →</button>
      <button class="btn btn-ghost btn-full" id="btn-force-start" style="display:none;font-size:0.85rem;" onclick="startBattle()">Trotzdem starten</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="shared.js"></script>
<script>
  initStarfield(); initThemeToggle();
  const role=Session.get('role'), code=Session.get('code'), name=Session.get('name'), avatar=Session.get('avatar')||'🙂', playerId=Session.get('playerId')||getPlayerId();
  if(!code) window.location.href='/';
  const socket=io();

  let currentPlayers = []; // Store current player list from server updates

  function updateBattleStartButtons(players) {
    currentPlayers = players; // Update the global player list
    const uploadedPlayersCount = players.filter(p => p.hasImage).length;
    const btnStartBattle = document.getElementById('btn-start-battle');
    const btnForceStart = document.getElementById('btn-force-start');
    
    if (role === 'host') {
      document.getElementById('players-status').style.display = 'block';

      if (btnStartBattle.style.display === 'flex') { // This state is set by all_uploaded handler
         btnStartBattle.disabled = uploadedPlayersCount < 2;
         btnForceStart.style.display = 'none'; // Hide force start if all are explicitly uploaded
      } else { // Normal update cycle, not all uploaded yet
         btnStartBattle.style.display = 'none'; // Keep normal battle start hidden
         btnForceStart.style.display = uploadedPlayersCount >= 1 ? 'flex' : 'none'; // Show if at least one player (host) has uploaded
         btnForceStart.disabled = uploadedPlayersCount < 2; // Disable if less than 2 uploaded players
      }
    } else {
      btnStartBattle.style.display = 'none';
      btnForceStart.style.display = 'none';
    }
  }

  socket.on('connect',()=>{
    if(role==='host') socket.emit('host_rejoin',{code,hostName:name,avatar,playerId});
    else socket.emit('join_room',{code,playerName:name,avatar,playerId});
    setTimeout(()=>socket.emit('check_state',{code}),500);
  });

  // Alle 2 Sekunden prüfen ob Battle schon läuft
  const stateInterval = setInterval(()=>{
    if(socket.connected) socket.emit('check_state',{code});
  }, 2000);

  // Interval stoppen wenn Battle startet
  function goToBattle() {
    clearInterval(stateInterval);
    window.location.href='/battle.html';
  }

  const dz=document.getElementById('drop-zone');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))handleFile(f);});

  let selectedFile=null;
  async function handleFile(file){
    if(!file)return;
    document.getElementById('upload-status').textContent='Bild wird vorbereitet...';
    try {
      selectedFile=await cropImageFile(file);
      const img=document.getElementById('preview-img');
      img.src=URL.createObjectURL(selectedFile);
      img.style.display='block';
      document.getElementById('upload-status').textContent=file.name+' ausgewählt und zugeschnitten';
    } catch(err) {
      selectedFile=file;
      const r=new FileReader();
      r.onload=e=>{const img=document.getElementById('preview-img');img.src=e.target.result;img.style.display='block';};
      r.readAsDataURL(file);
      document.getElementById('upload-status').textContent=file.name+' ausgewählt';
    }
  }

  function cropImageFile(file){
    return new Promise((resolve,reject)=>{
      const img=new Image();
      const url=URL.createObjectURL(file);
      img.onload=()=>{
        const size=Math.min(img.naturalWidth,img.naturalHeight);
        const sx=(img.naturalWidth-size)/2;
        const sy=(img.naturalHeight-size)/2;
        const canvas=document.createElement('canvas');
        canvas.width=900;
        canvas.height=900;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,sx,sy,size,size,0,0,900,900);
        URL.revokeObjectURL(url);
        canvas.toBlob(blob=>{
          if(!blob){reject(new Error('Crop fehlgeschlagen'));return;}
          resolve(new File([blob], file.name.replace(/\.[^.]+$/, '')+'-crop.jpg', { type:'image/jpeg' }));
        },'image/jpeg',0.9);
      };
      img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Bild konnte nicht gelesen werden'));};
      img.src=url;
    });
  }

  async function submitUpload(){
    if(!selectedFile){showToast('⚠️ Foto auswählen');return;}
    const desc=document.getElementById('img-desc').value.trim()||name;
    const btn=document.getElementById('btn-submit');btn.disabled=true;btn.textContent='Lädt hoch…';
    const fd=new FormData();fd.append('image',selectedFile);
    try{
      const res=await fetch('/upload',{method:'POST',body:fd});
      const data=await res.json();
      if(data.error)throw new Error(data.error);
      document.getElementById('upload-status').textContent='✓ Erfolgreich hochgeladen';
      btn.textContent='✓ Fertig';
      document.getElementById('players-status').style.display='block';
      if(role==='host')document.getElementById('btn-force-start').style.display='flex';
      socket.emit('player_upload',{code,imagePath:data.path,imageDesc:desc,playerName:name,avatar,playerId});
    }catch(err){
      showToast('❌ '+err.message);btn.disabled=false;btn.textContent='Fertig →';
    }
  }

  socket.on('upload_update',({players})=>{
    const w=document.getElementById('upload-progress');if(!w)return;w.innerHTML='';
    players.forEach(p=>{
      const pill=document.createElement('div');
      pill.className='player-pill'+(p.hasImage?' uploaded':'');
      const av=document.createElement('span');
      av.className='avatar-chip';
      renderAvatarElement(av, p.avatar);
      const text=document.createElement('span');
      text.textContent=`${p.name}${p.hasImage?' ✓':''}`;
      pill.append(av,text);
      w.appendChild(pill);
    });
  });

  socket.on('all_uploaded',()=>{
    if(role==='host'){
      document.getElementById('players-status').style.display='block';
      document.getElementById('btn-start-battle').style.display='flex';
      document.getElementById('btn-force-start').style.display='none';
      showToast('✓ Alle haben hochgeladen');
    }
  });

  function startBattle(){if(role!=='host')return;socket.emit('start_battle',{code});}

  // Alle Wege zum Battle abfangen
  socket.on('phase_battle', goToBattle);
  // KEIN 'new_pair' -> goToBattle hier! Sonst Race-Condition:
  // new_pair käme auf upload.html an bevor battle.html geladen ist → Event verpasst.
  // Stattdessen: battle.html selbst fordert das aktuelle Paar an (request_current_pair).

  socket.on('phase_recap', () => {
    clearInterval(stateInterval);
    window.location.href = '/recap.html';
  });

  socket.on('show_results', ({results}) => {
    // Nur weiterleiten wenn wir wirklich schon im Results-State sind,
    // nicht während Battle/Recap noch läuft
    Session.set('results', results);
    clearInterval(stateInterval);
    window.location.href = '/results.html';
  });

  socket.on('error',msg=>showToast('❌ '+msg));
</script>
</body>
</html>
