<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rückblick – Rathering Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .recap-page { position:relative; z-index:1; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
    .recap-header { padding:20px 44px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
    .recap-content { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px 44px; min-height:0; }
    .recap-card { width:100%; max-width:800px; display:grid; grid-template-columns:1.2fr 1fr; gap:32px; background:var(--surface); border:1px solid var(--border2); border-radius:28px; padding:32px; box-shadow:var(--shadow); animation: entry-in 0.6s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes entry-in { from{opacity:0;transform:scale(0.9) translateY(40px);} to{opacity:1;transform:none;} }
    .recap-media { border-radius:20px; overflow:hidden; background:var(--bg2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; aspect-ratio:1; }
    .recap-media img { width:100%; height:100%; object-fit:cover; }
    .recap-info { display:flex; flex-direction:column; justify-content:center; gap:20px; }
    .recap-user { display:flex; align-items:center; gap:14px; }
    .recap-avatar { width:56px; height:56px; border-radius:50%; background:var(--surface2); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:1.8rem; overflow:hidden; }
    .recap-name { font-family:var(--font-head); font-size:1.6rem; font-weight:700; color:var(--text); }
    .recap-desc-box { background:var(--bg2); border-radius:18px; padding:20px; border:1px solid var(--border); position:relative; }
    .recap-desc-box::before { content:'"'; position:absolute; top:10px; left:12px; font-size:3rem; font-family:serif; color:var(--accent); opacity:0.2; line-height:1; }
    .recap-desc { font-size:1.1rem; color:var(--text); line-height:1.5; font-style:italic; padding-left:10px; }
    .recap-progress { position:fixed; bottom:0; left:0; height:4px; background:var(--accent); transition:width 7s linear; }
    @media(max-width:800px) {
      .recap-card { grid-template-columns:1fr; gap:20px; padding:20px; }
      .recap-media { aspect-ratio:1.2; }
      .recap-name { font-size:1.3rem; }
      .recap-desc { font-size:1rem; }
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="recap-page">
  <div class="recap-header">
    <div>
      <div class="label">Showcase</div>
      <h2 class="title-md" id="recap-count">Bild 0 / 0</h2>
    </div>
    <div class="badge"><span class="dot"></span><span id="code-label">——</span></div>
  </div>

  <div class="recap-content" id="recap-container">
    <div style="text-align:center; opacity:0.5;">Warte auf Start…</div>
  </div>

  <div class="recap-progress" id="recap-progress" style="width:0%"></div>

  <div class="reaction-bar">
    <button class="reaction-btn" onclick="sendReaction('🔥')">🔥</button>
    <button class="reaction-btn" onclick="sendReaction('😂')">😂</button>
    <button class="reaction-btn" onclick="sendReaction('👏')">👏</button>
    <button class="reaction-btn" onclick="sendReaction('💩')">💩</button>
  </div>
</div>
<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="shared.js"></script>
<script>
  initStarfield(); initThemeToggle();
  const role=Session.get('role'), code=Session.get('code'), name=Session.get('name'), avatar=Session.get('avatar')||'🙂', playerId=Session.get('playerId')||getPlayerId();
  if(!code) window.location.href='/';
  document.getElementById('code-label').textContent=code;
  const socket=io();
  socket.on('connect',()=>{
    if(role==='host') socket.emit('host_rejoin',{code,hostName:name,avatar,playerId});
    else socket.emit('join_room',{code,playerName:name,avatar,playerId});
    socket.emit('request_recap_status', {code});
  });

  socket.on('recap_update', ({entry, index, total}) => {
    renderEntry(entry, index, total);
  });

  function renderEntry(entry, index, total) {
    document.getElementById('recap-count').textContent = `Bild ${index + 1} / ${total}`;
    const container = document.getElementById('recap-container');
    
    // Reset progress bar animation
    const progress = document.getElementById('recap-progress');
    progress.style.transition = 'none';
    progress.style.width = '0%';
    setTimeout(() => {
      progress.style.transition = 'width 7s linear';
      progress.style.width = '100%';
    }, 50);

    const media = entry.path 
      ? `<img src="${entry.path}" alt="${entry.name}" onerror="this.style.display='none'">`
      : `<div style="font-size:5rem;">${avatarHtml(entry.avatar)}</div>`;

    container.innerHTML = `
      <div class="recap-card">
        <div class="recap-media">
          ${media}
        </div>
        <div class="recap-info">
          <div class="recap-user">
            <div class="recap-avatar">${avatarHtml(entry.avatar)}</div>
            <div class="recap-name">${escapeHtml(entry.name)}</div>
          </div>
          ${entry.desc ? `
            <div class="recap-desc-box">
              <div class="recap-desc">${escapeHtml(entry.desc)}</div>
            </div>
          ` : ''}
          <div style="margin-top:auto; font-size:0.8rem; color:var(--text3); text-transform:uppercase; letter-spacing:0.05em;">
            Präsentiert im Rathering Game
          </div>
        </div>
      </div>
    `;
  }

  socket.on('reaction_received', ({ emoji }) => {
    const el = document.createElement('div');
    el.className = 'flying-emoji';
    el.textContent = emoji;
    el.style.setProperty('--rx', (Math.random() * 60 - 30) + 'px');
    el.style.setProperty('--rx-end', (Math.random() * 200 - 100) + 'px');
    el.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  });

  function sendReaction(emoji) {
    socket.emit('send_reaction', { code, emoji });
    soundClick();
  }

  socket.on('show_results',({results})=>{Session.set('results',results);window.location.href='/results.html';});
  socket.on('error',msg=>showToast('❌ '+msg));

  function escapeHtml(v){ return String(v).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
