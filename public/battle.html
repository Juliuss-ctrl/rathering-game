<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battle – Rathering Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
 body{overflow:hidden;}
.battle-page{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}
.battle-header{padding:20px 44px 12px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
.battle-meta{display:flex;justify-content:space-between;align-items:center;}
.battle-status{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
.timer-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border2);border-radius:50px;background:var(--surface2);padding:7px 13px;font-size:0.78rem;font-weight:700;color:var(--text);}
.timer-dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 10px var(--success);}
.timer-pill.danger{border-color:rgba(245,158,11,0.42);color:var(--gold);}
.timer-pill.danger .timer-dot{background:var(--gold);box-shadow:0 0 10px var(--gold);}
.battle-q{text-align:center;font-family:var(--font-head);font-size:clamp(1.3rem,2.5vw,2rem);font-weight:700;letter-spacing:-0.01em;color:var(--text);padding-top:6px;}
.arena{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 36px;gap:20px;min-height:0;}
.battle-card{flex:1;max-width:500px;min-height:0;max-height:100%;}
.battle-card img{max-width:100%;max-height:calc(100vh-280px);object-fit:contain;border-radius:10px;}
.card-name{font-family:var(--font-head);font-size:1.1rem;font-weight:600;color:var(--text);text-align:center;margin-top:10px;letter-spacing:-0.01em;}
.battle-avatar{width:44px;height:44px;font-size:2rem;margin-top:10px;line-height:1;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:50%;}
.card-desc{font-size:0.8rem;color:var(--text3);text-align:center;margin-top:3px;}
.no-image{width:100%;height:200px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:0.88rem;border:1.5px dashed var(--border2);border-radius:10px;}
.battle-footer{padding:8px 44px 22px;text-align:center;flex-shrink:0;}
#vote-status{font-size:0.85rem;color:var(--text2);margin-bottom:6px;min-height:20px;}
.hint{font-size:0.68rem;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;}
.voted-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border-radius:var(--r2);pointer-events:none;opacity:0;transition:opacity 0.2s;font-size:3rem;}
.battle-card.voted .voted-overlay{opacity:1;}

/* ── Mobile ── */
@media(max-width:700px){
  body{overflow:hidden;}
  .battle-header{padding:12px 16px 8px;}
  .battle-q{font-size:1rem;padding-top:4px;}
  .arena{
    flex-direction:row;
    padding:6px 10px;
    gap:8px;
    align-items:stretch;
  }
  .battle-card{
    flex:1;
    max-width:none;
    min-width:0;
  }
  .battle-card > div {
    padding:12px !important;
  }
  .battle-card img{
    max-height:calc(50vh - 120px);
    width:100%;
    object-fit:cover;
    border-radius:8px;
  }
  .card-name{font-size:0.85rem;margin-top:6px;}
  .card-desc{font-size:0.7rem;}
  .vs-badge{
    width:36px;height:36px;font-size:0.65rem;
    flex-shrink:0;align-self:center;
  }
  .battle-footer{padding:6px 16px 12px;}
  #vote-status{font-size:0.78rem;}
}
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="battle-page">
  <div class="battle-header">
    <div class="battle-meta">
      <span class="label" id="round-label">Runde 1 / ?</span>
      <div class="badge"><span class="dot"></span><span id="code-label">——</span></div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="battle-status">
      <div class="timer-pill" id="timer-pill"><span class="timer-dot"></span><span id="timer-label">15s</span></div>
    </div>
    <div class="battle-q">Was gefällt dir besser?</div>
  </div>

  <div class="arena">
    <div class="battle-card glass-card" id="card-left" onclick="castVote('left')">
      <div style="padding:22px;display:flex;flex-direction:column;align-items:center;height:100%;"><div id="img-left"><div class="no-image">Lädt…</div></div><div class="battle-avatar" id="avatar-left">🙂</div><div class="card-name" id="name-left">—</div><div class="card-desc" id="desc-left"></div></div>
      <div class="voted-overlay">✓</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="battle-card glass-card" id="card-right" onclick="castVote('right')">
      <div style="padding:22px;display:flex;flex-direction:column;align-items:center;height:100%;"><div id="img-right"><div class="no-image">Lädt…</div></div><div class="battle-avatar" id="avatar-right">🙂</div><div class="card-name" id="name-right">—</div><div class="card-desc" id="desc-right"></div></div>
      <div class="voted-overlay">✓</div>
    </div>
  </div>

  <div class="reaction-bar">
    <button class="reaction-btn" onclick="sendReaction('🔥')">🔥</button>
    <button class="reaction-btn" onclick="sendReaction('😂')">😂</button>
    <button class="reaction-btn" onclick="sendReaction('👏')">👏</button>
    <button class="reaction-btn" onclick="sendReaction('💩')">💩</button>
  </div>

  <div class="battle-footer">
    <div id="vote-status"></div>
    <div class="hint">Klicke auf dein Lieblingsbild</div>
  </div>
</div>
<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="shared.js"></script>
<script>
  initStarfield(); initThemeToggle();
  const role=Session.get('role'), code=Session.get('code'), name=Session.get('name'), avatar=Session.get('avatar')||'🙂', playerId=Session.get('playerId')||getPlayerId();
  if(!code) window.location.href='/';
  document.getElementById('code-label').textContent=code;
  const socket=io();
  socket.on('connect',()=>{
    if(role==='host') socket.emit('host_rejoin',{code,hostName:name,avatar,playerId});
    else socket.emit('join_room',{code,playerName:name,avatar,playerId});
    setTimeout(()=>socket.emit('request_current_pair',{code}),1500);
  });
  let hasVoted=false, currentLeft=null, currentRight=null, timerInterval=null, currentTimerEndsAt=0;
  socket.on('new_pair',({pairIndex,totalPairs,bracketRound,timerEndsAt,roundSeconds,left,right})=>{
    hasVoted=false;currentLeft=left;currentRight=right;
    document.getElementById('round-label').textContent=`Turnierrunde ${bracketRound||1} · Duell ${pairIndex+1} / ${totalPairs}`;
    document.getElementById('progress-fill').style.width=Math.round((pairIndex/Math.max(1,totalPairs))*100)+'%';
    document.getElementById('card-left').classList.remove('voted');
    document.getElementById('card-right').classList.remove('voted');
    setCard('left',left);setCard('right',right);
    document.getElementById('vote-status').textContent='';
    startTimer(timerEndsAt, roundSeconds || 15);
  });
  function setCard(side,data){
    const iw=document.getElementById('img-'+side);
    renderAvatarElement(document.getElementById('avatar-'+side), data ? data.avatar : '', '');
    document.getElementById('name-'+side).textContent=data?data.name:'—';
    document.getElementById('desc-'+side).textContent=data?data.desc:'';
    if(data&&data.path) iw.innerHTML=`<img src="${data.path}" alt="${data.name}" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>Nicht gefunden</div>'">`;
    else if(!data){iw.innerHTML=`<div class="no-image">Automatisch weiter</div>`;document.getElementById('card-'+side).style.opacity='0.35';}
    else iw.innerHTML=`<div class="no-image">Kein Bild</div>`;
  }
  function castVote(side){
    if(hasVoted){showToast('Du hast bereits abgestimmt');return;}
    const winner=side==='left'?currentLeft:currentRight;
    if(!winner){showToast('Ungültige Wahl');return;}
    hasVoted=true;soundVote();
    document.getElementById('card-'+side).classList.add('voted');
    document.getElementById('vote-status').textContent=`✓ ${winner.name} gewählt`;
    socket.emit('vote',{code,winnerId:winner.playerId,winnerName:winner.name});
  }
  socket.on('vote_update',({votedCount,total})=>{document.getElementById('vote-status').textContent=`${votedCount} / ${total} haben abgestimmt`;});
  socket.on('time_up',()=>{
    soundTimeUp();
    document.getElementById('vote-status').textContent='Zeit abgelaufen';
    document.getElementById('timer-label').textContent='0s';
    document.getElementById('timer-pill').classList.add('danger');
  });
  socket.on('show_results',({results})=>{Session.set('results',results);window.location.href='/results.html';});
  socket.on('phase_recap',()=>{
    window.location.href='/recap.html';
  });
  socket.on('error',msg=>showToast('❌ '+msg));

  socket.on('reaction_received', ({ emoji, senderName }) => {
    const el = document.createElement('div');
    el.className = 'flying-emoji';
    el.innerHTML = `
      <span class="flying-emoji-text">${emoji}</span>
      ${senderName ? `<span class="flying-emoji-sender">${escapeHtml(senderName)}</span>` : ''}
    `;
    el.style.setProperty('--rx', (Math.random() * 60 - 30) + 'px');
    el.style.setProperty('--rx-end', (Math.random() * 200 - 100) + 'px');
    el.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  });

  function escapeHtml(v) { return String(v).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

  function sendReaction(emoji) {
    socket.emit('send_reaction', { code, emoji });
    soundClick();
  }

  function startTimer(timerEndsAt, roundSeconds){
    clearInterval(timerInterval);
    currentTimerEndsAt = timerEndsAt || Date.now() + roundSeconds * 1000;
    const pill=document.getElementById('timer-pill');
    const label=document.getElementById('timer-label');
    function tick(){
      const remaining=Math.max(0, Math.ceil((currentTimerEndsAt-Date.now())/1000));
      label.textContent=remaining+'s';
      pill.classList.toggle('danger', remaining<=5);
      if(remaining<=0) clearInterval(timerInterval);
    }
    tick();
    timerInterval=setInterval(tick,250);
  }
</script>
</body>
</html>
