<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby – Rathering Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .wrap { position:relative;z-index:1;width:100%;max-width:580px;padding:24px;margin:auto;display:flex;flex-direction:column;gap:20px;min-height:100vh;justify-content:center; }
    .code-box { background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r2);padding:32px;text-align:center; }
    .code-hint { font-size:0.72rem;color:var(--text3);margin-top:8px;letter-spacing:0.06em; }
    .players-card { padding:24px; flex:1; }
    #player-list { display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;min-height:40px; }
    #player-count { font-size:0.75rem;color:var(--text3);margin-top:10px;letter-spacing:0.06em; }
    .actions { display:flex;flex-direction:column;gap:10px; }
    #btn-start { display:none; }
    .waiting { text-align:center;font-size:0.85rem;color:var(--text3);padding:12px 0; }
    .qr-wrap { margin-top:16px; display:flex; flex-direction:column; align-items:center; gap:6px; }
    .qr-label { font-size:0.65rem; color:var(--text3); letter-spacing:0.1em; text-transform:uppercase; }
    #qr-img { border-radius:10px; display:none; width:160px; height:160px; }
    
    .lobby-content { display:flex; flex-direction:column; gap:20px; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrap">
  <div class="fade-in">
    <div class="badge" style="margin-bottom:14px;"><span class="dot"></span>Lobby</div>
    <h1 class="title-lg">Warte auf<br>Spieler…</h1>
  </div>

  <div class="code-box fade-in" style="animation-delay:0.1s;">
    <div class="label" style="margin-bottom:12px;">Raum-Code</div>
    <div class="room-code" id="room-code" onclick="copyCode()">——</div>
    <div class="code-hint">Klicken zum Kopieren · Code mit Freunden teilen</div>
    <div class="qr-wrap">
      <img id="qr-img" alt="QR Code">
      <div class="qr-label">QR Code scannen zum Beitreten</div>
    </div>
  </div>

  <div class="lobby-content fade-in" style="animation-delay:0.15s;">
    <div class="glass-card players-card">
      <div class="label">Spieler</div>
      <div id="player-list"></div>
      <div id="player-count"></div>
    </div>

    <div class="glass-card chat-box">
      <div class="chat-header">💬 Live Chat</div>
      <div class="chat-messages" id="chat-messages">
        <div style="color:var(--text3); font-size:0.75rem; text-align:center; margin-top:20px;">Noch keine Nachrichten...</div>
      </div>
      <div class="chat-input-wrap">
        <input class="input" id="chat-input" placeholder="Nachricht..." maxlength="100" autocomplete="off" style="font-size:0.85rem; padding:10px 14px;">
        <button class="btn btn-primary" onclick="sendChat()" style="padding:0 16px; min-width:auto;">Send</button>
      </div>
    </div>
  </div>

  <div class="actions fade-in" style="animation-delay:0.2s;">
    <button class="btn btn-primary btn-full" id="btn-start" onclick="startUpload()">Spiel starten →</button>
    <div class="waiting" id="waiting-msg">Warte auf den Host…</div>
    <button class="btn btn-ghost btn-full" onclick="leaveRoom()">Verlassen</button>
  </div>
</div>
<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="shared.js"></script>
<script>
  initStarfield(); initThemeToggle();
  const role=Session.get('role'); let code=Session.get('code'); const name=Session.get('name'), avatar=Session.get('avatar')||'🙂', playerId=Session.get('playerId')||getPlayerId();
  if(!code||!role||!name) window.location.href='/';
  document.getElementById('room-code').textContent = code;
  if(role==='host') { document.getElementById('btn-start').style.display='flex'; document.getElementById('waiting-msg').style.display='none'; }

  function generateQR(c) {
    const url = encodeURIComponent(`${window.location.origin}/?join=${c}`);
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    const bg = isLight ? 'ffffff' : '18181f';
    const fg = isLight ? '000000' : 'ffffff';
    const img = document.getElementById('qr-img');
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${url}&bgcolor=${bg}&color=${fg}&qzone=1`;
    img.style.display = 'block';
  }

  setTimeout(() => generateQR(code), 400);

  const socket = io();
  socket.on('connect', () => { if(role==='host') socket.emit('host_rejoin',{code,hostName:name,avatar,playerId}); else socket.emit('join_room',{code,playerName:name,avatar,playerId}); });
  socket.on('host_rejoined', ({code:c, avatar:a}) => {
    code=c; Session.set('code',c);
    if(a) Session.set('avatar',a);
    document.getElementById('room-code').textContent=c;
    generateQR(c);
  });
  socket.on('lobby_update', ({players, host, hostName}) => {
    const list = document.getElementById('player-list'); list.innerHTML='';
    const hb = document.createElement('div');
    hb.className='host-badge';
    const hostAvatar=document.createElement('span');
    hostAvatar.className='avatar-chip';
    renderAvatarElement(hostAvatar, host?.avatar, '👑');
    const hostText=document.createElement('span');
    hostText.textContent=`${hostName} (Host)`;
    hb.append(hostAvatar, hostText);
    list.appendChild(hb);
    players.forEach(p => {
      const pill=document.createElement('div');
      pill.className='player-pill'+(p.hasImage?' uploaded':'');
      const av=document.createElement('span');
      av.className='avatar-chip';
      renderAvatarElement(av, p.avatar);
      const text=document.createElement('span');
      text.textContent=`${p.name}${p.hasImage?' ✓':''}`;
      pill.append(av,text);
      list.appendChild(pill);
    });
    document.getElementById('player-count').textContent = `${players.length} Spieler beigetreten`;
  });

  // Chat logic
  const chatInput = document.getElementById('chat-input');
  const chatMessages = document.getElementById('chat-messages');

  function sendChat() {
    const msg = chatInput.value.trim();
    if(!msg) return;
    socket.emit('send_chat', { code, message: msg });
    chatInput.value = '';
    chatInput.focus();
  }

  chatInput.onkeydown = e => { if(e.key==='Enter') sendChat(); };

  socket.on('chat_message', ({ name, avatar, message, id }) => {
    if(chatMessages.children.length === 1 && chatMessages.firstChild.nodeType === Node.ELEMENT_NODE && chatMessages.firstChild.style.textAlign === 'center') {
      chatMessages.innerHTML = '';
    }
    const div = document.createElement('div');
    div.className = 'chat-msg';
    div.innerHTML = `
      <div class="chat-msg-avatar">${avatarHtml(avatar)}</div>
      <div class="chat-msg-content">
        <span class="chat-msg-name">${escapeHtml(name)}</span>
        ${escapeHtml(message)}
      </div>
    `;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    if(name !== Session.get('name')) soundClick(); // Play a small click for others' messages
  });

  socket.on('phase_upload', () => window.location.href='/upload.html');
  socket.on('error', msg => showToast('❌ '+msg));
  function copyCode() { navigator.clipboard.writeText(code).then(() => showToast('✓ Code kopiert')); }
  function startUpload() { if(role!=='host') return; socket.emit('start_upload',{code}); }
  function leaveRoom() { Session.clear(); window.location.href='/'; }
</script>
</body>
</html>
