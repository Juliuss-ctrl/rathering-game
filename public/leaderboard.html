<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard – Rathering Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .lb-page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 56px 20px 60px;
      gap: 40px;
    }

    /* ── Header ── */
    .lb-header { text-align: center; }
    .lb-header h1 {
      font-family: var(--font-head);
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 8px;
    }
    .lb-header p { color: var(--text2); font-size: 0.95rem; }
    .score-pills {
      display: flex; gap: 8px; justify-content: center;
      flex-wrap: wrap; margin-top: 16px;
    }
    .score-pill {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 50px;
      padding: 6px 14px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 0.02em;
    }

    /* ── Podium ── */
    .podium-wrap {
      width: 100%; max-width: 680px;
    }
    .podium-stage {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
    }

    .podium-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
      max-width: 200px;
    }
    .podium-slot.first { order: 2; }
    .podium-slot.second { order: 1; }
    .podium-slot.third { order: 3; }

    .podium-avatar {
      position: relative;
      width: 72px; height: 72px;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid var(--border2);
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }
    .podium-slot.first .podium-avatar {
      width: 90px; height: 90px;
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(245,158,11,0.15);
    }
    .podium-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .podium-medal {
      position: absolute;
      bottom: -6px; right: -6px;
      font-size: 1.1rem;
      line-height: 1;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
    }
    .podium-info { text-align: center; }
    .podium-name {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .podium-slot.first .podium-name { font-size: 1.1rem; }
    .podium-pts {
      font-size: 0.75rem;
      color: var(--text2);
      margin-top: 2px;
    }

    .podium-block {
      width: 100%;
      border-radius: 14px 14px 0 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 800;
      color: rgba(255,255,255,0.18);
    }
    .podium-slot.first .podium-block {
      height: 90px;
      background: linear-gradient(160deg, rgba(245,158,11,0.25), rgba(245,158,11,0.08));
      border: 1px solid rgba(245,158,11,0.3);
      color: rgba(245,158,11,0.4);
    }
    .podium-slot.second .podium-block {
      height: 60px;
      background: linear-gradient(160deg, rgba(148,163,184,0.15), rgba(148,163,184,0.05));
      border: 1px solid rgba(148,163,184,0.2);
      color: rgba(148,163,184,0.4);
    }
    .podium-slot.third .podium-block {
      height: 44px;
      background: linear-gradient(160deg, rgba(217,119,6,0.15), rgba(217,119,6,0.05));
      border: 1px solid rgba(217,119,6,0.2);
      color: rgba(217,119,6,0.35);
    }

    /* ── Main layout ── */
    .lb-layout {
      width: 100%; max-width: 860px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 16px;
      align-items: start;
    }

    /* ── Rangliste ── */
    .lb-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      overflow: hidden;
    }
    .lb-card-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .lb-card-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
    }
    .lb-card-body { padding: 8px 0; }

    .rank-row {
      display: grid;
      grid-template-columns: 48px 44px 1fr auto;
      align-items: center;
      gap: 0 10px;
      padding: 10px 16px;
      transition: background 0.15s;
    }
    .rank-row:hover { background: var(--surface2); }
    .rank-row + .rank-row { border-top: 1px solid var(--border); }

    .rank-num {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text3);
      text-align: center;
    }
    .rank-num.top { color: var(--text2); }
    .rank-avatar {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      overflow: hidden;
      flex-shrink: 0;
    }
    .rank-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .rank-info {}
    .rank-name {
      font-weight: 700;
      font-size: 0.92rem;
      color: var(--text);
    }
    .rank-meta {
      font-size: 0.72rem;
      color: var(--text3);
      margin-top: 1px;
    }
    .rank-score {
      text-align: right;
    }
    .rank-pts {
      font-family: var(--font-head);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .rank-pts-label {
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-top: 2px;
    }

    /* ── Historie ── */
    .hist-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      transition: background 0.15s;
    }
    .hist-row:hover { background: var(--surface2); }
    .hist-row + .hist-row { border-top: 1px solid var(--border); }
    .hist-badge {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text2);
      flex-shrink: 0;
    }
    .hist-info { flex: 1; min-width: 0; }
    .hist-name {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hist-date {
      font-size: 0.68rem;
      color: var(--text3);
      margin-top: 1px;
    }
    .hist-pts {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--gold);
      flex-shrink: 0;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--text3);
      font-size: 0.88rem;
    }

    /* ── Actions ── */
    .lb-actions {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    }

    @media (max-width: 700px) {
      .lb-layout { grid-template-columns: 1fr; }
      .podium-slot.first .podium-avatar { width: 76px; height: 76px; }
      .podium-slot.first .podium-block { height: 72px; }
      .podium-slot.second .podium-block { height: 50px; }
      .podium-slot.third .podium-block { height: 36px; }
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="lb-page">

  <div class="lb-header fade-in">
    <h1>🏆 Leaderboard</h1>
    <p>Gesamtpunkte, Siege und letzte Platzierungen.</p>
    <div class="score-pills">
      <span class="score-pill">🥇 1. Platz = 3 Pkt</span>
      <span class="score-pill">🥈 2. Platz = 2 Pkt</span>
      <span class="score-pill">🥉 3. Platz = 1 Pkt</span>
    </div>
  </div>

  <div class="podium-wrap fade-in" id="podium-wrap" style="animation-delay:0.08s;display:none;">
    <div class="podium-stage" id="podium"></div>
  </div>

  <div class="lb-layout fade-in" style="animation-delay:0.14s;">
    <div class="lb-card">
      <div class="lb-card-header">
        <span class="lb-card-title">Rangliste</span>
      </div>
      <div class="lb-card-body" id="leaderboard">
        <div class="empty-state">Wird geladen…</div>
      </div>
    </div>

    <div class="lb-card">
      <div class="lb-card-header">
        <span class="lb-card-title">Punkte-Historie</span>
      </div>
      <div class="lb-card-body" id="history">
        <div class="empty-state">Noch keine Spiele.</div>
      </div>
    </div>
  </div>

  <div class="lb-actions fade-in" style="animation-delay:0.2s;">
    <a class="btn btn-primary" href="/">Startseite</a>
    <button class="btn btn-ghost" onclick="resetBoard()">Zurücksetzen</button>
  </div>

</div>
<div id="toast"></div>
<script src="shared.js"></script>
<script>
  initStarfield();
  initThemeToggle();
  loadLeaderboard();

  async function loadLeaderboard() {
    try {
      const data = await apiRequest('/api/leaderboard');
      renderPodium(data.leaderboard || []);
      renderLeaderboard(data.leaderboard || []);
      renderHistory(data.history || []);
    } catch (err) {
      document.getElementById('leaderboard').innerHTML = '<div class="empty-state">Konnte nicht geladen werden.</div>';
    }
  }

  function renderPodium(entries) {
    const top3 = entries.slice(0, 3);
    if (!top3.length) return;
    document.getElementById('podium-wrap').style.display = 'block';

    const slots = [
      { entry: top3[1], cls: 'second', medal: '🥈', num: '2' },
      { entry: top3[0], cls: 'first',  medal: '🥇', num: '1' },
      { entry: top3[2], cls: 'third',  medal: '🥉', num: '3' },
    ].filter(s => s.entry);

    document.getElementById('podium').innerHTML = slots.map(({ entry, cls, medal, num }) => `
      <div class="podium-slot ${cls}">
        <div class="podium-avatar">
          ${entry.imagePath
            ? `<img src="${escapeHtml(entry.imagePath)}" alt="${escapeHtml(entry.name)}" onerror="this.outerHTML='<span style=\\'font-size:2rem\\'>${avatarHtml(entry.avatar||'🙂')}</span>'">`
            : `<span style="font-size:${cls==='first'?'2.2':'1.8'}rem">${avatarHtml(entry.avatar||'🙂')}</span>`
          }
          <span class="podium-medal">${medal}</span>
        </div>
        <div class="podium-info">
          <div class="podium-name">${escapeHtml(entry.name)}</div>
          <div class="podium-pts">${entry.points} Pkt · ${entry.wins||0} Sieg${entry.wins===1?'':'e'}</div>
        </div>
        <div class="podium-block">${num}</div>
      </div>
    `).join('');
  }

  function renderLeaderboard(entries) {
    const el = document.getElementById('leaderboard');
    if (!entries.length) {
      el.innerHTML = '<div class="empty-state">Noch keine Punkte.<br>Beendet ein Spiel!</div>';
      return;
    }
    el.innerHTML = entries.map((e, i) => `
      <div class="rank-row">
        <div class="rank-num ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
        <div class="rank-avatar">${avatarHtml(e.avatar||'🙂')}</div>
        <div class="rank-info">
          <div class="rank-name">${escapeHtml(e.name)}</div>
          <div class="rank-meta">${e.wins||0} Sieg${e.wins===1?'':'e'} · ${e.games||0} Top-3</div>
        </div>
        <div class="rank-score">
          <div class="rank-pts">${e.points}</div>
          <div class="rank-pts-label">Punkte</div>
        </div>
      </div>
    `).join('');
  }

  function renderHistory(entries) {
    const el = document.getElementById('history');
    if (!entries.length) {
      el.innerHTML = '<div class="empty-state">Noch keine Spiele.</div>';
      return;
    }
    el.innerHTML = entries.slice(0, 15).map(item => `
      <div class="hist-row">
        <div class="hist-badge">#${item.rank}</div>
        <div class="hist-info">
          <div class="hist-name">${escapeHtml(item.name)}</div>
          <div class="hist-date">${new Date(item.date).toLocaleDateString('de-AT')} · ${item.votes} Stimme${item.votes===1?'':'n'}</div>
        </div>
        <div class="hist-pts">+${item.points}</div>
      </div>
    `).join('');
  }

  async function resetBoard() {
    if (!confirm('Leaderboard wirklich zurücksetzen?')) return;
    const key = prompt('Admin-Key eingeben:');
    if (!key) return;
    try {
      await apiRequest('/api/leaderboard/reset', { method: 'POST', body: JSON.stringify({ key }) });
      showToast('✓ Zurückgesetzt');
      loadLeaderboard();
    } catch (err) {
      showToast('❌ ' + err.message);
    }
  }
</script>
</body>
</html>
