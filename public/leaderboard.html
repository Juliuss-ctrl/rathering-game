<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - Rathering Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .leaderboard-page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px;}
    .leaderboard-header{text-align:center;margin-bottom:30px;}
    .score-rules{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px;}
    .score-pill{border:1px solid var(--border2);background:var(--surface2);border-radius:50px;padding:7px 13px;font-size:0.76rem;color:var(--text2);}
    .podium{width:100%;max-width:920px;display:grid;grid-template-columns:1fr 1.18fr 1fr;gap:14px;align-items:end;margin-bottom:22px;}
    .podium-card{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;border:1px solid var(--border2);border-radius:22px;background:var(--surface);padding:22px 16px;min-height:240px;box-shadow:var(--shadow);overflow:hidden;}
    .podium-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.08),transparent 42%);pointer-events:none;}
    .podium-card.first{min-height:300px;border-color:rgba(245,158,11,0.34);box-shadow:0 26px 70px rgba(245,158,11,0.12);}
    .podium-card.second{border-color:rgba(148,163,184,0.28);}
    .podium-card.third{border-color:rgba(217,119,6,0.28);}
    .podium-img{width:92px;height:92px;border-radius:24px;object-fit:cover;border:2px solid var(--border2);background:var(--bg2);}
    .podium-card.first .podium-img{width:118px;height:118px;border-color:var(--gold);}
    .podium-rank{font-size:2rem;line-height:1;}
    .podium-name{font-family:var(--font-head);font-size:1.35rem;font-weight:700;text-align:center;color:var(--text);}
    .podium-points{font-size:0.82rem;color:var(--text2);}
    .leaderboard-layout{width:100%;max-width:920px;display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start;}
    .panel-card{padding:20px;display:flex;flex-direction:column;gap:10px;}
    .panel-title{font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
    .leaderboard-row{display:grid;grid-template-columns:34px 44px 1fr auto;align-items:center;gap:12px;border:1px solid var(--border);background:var(--surface2);border-radius:var(--r);padding:12px 14px;}
    .leaderboard-rank{font-family:var(--font-head);font-size:1.05rem;font-weight:700;color:var(--text2);text-align:center;}
    .leaderboard-name{font-weight:700;color:var(--text);}
    .leaderboard-meta{font-size:0.76rem;color:var(--text3);}
    .leaderboard-points{font-family:var(--font-head);font-size:1.35rem;font-weight:700;color:var(--text);text-align:right;}
    .points-label{font-size:0.66rem;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;text-align:right;}
    .history-row{display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center;border-bottom:1px solid var(--border);padding:10px 0;}
    .history-row:last-child{border-bottom:none;}
    .history-rank{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:0.78rem;color:var(--text2);font-weight:700;}
    .history-name{font-weight:600;color:var(--text);font-size:0.88rem;}
    .history-date{font-size:0.7rem;color:var(--text3);}
    .history-points{font-weight:800;color:var(--gold);}
    .empty-state{padding:34px 20px;text-align:center;color:var(--text2);}
    .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:24px;}
    @media(max-width:820px){
      .podium{grid-template-columns:1fr;}
      .podium-card,.podium-card.first{min-height:auto;}
      .leaderboard-layout{grid-template-columns:1fr;}
    }
    @media(max-width:520px){
      .leaderboard-page{padding:34px 14px;}
      .leaderboard-row{grid-template-columns:28px 38px 1fr;gap:10px;}
      .leaderboard-points{grid-column:3;text-align:left;}
      .points-label{text-align:left;}
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="leaderboard-page">
  <div class="leaderboard-header fade-in">
    <div style="font-size:3rem;margin-bottom:12px;">🏆</div>
    <h1 class="title-xl">Leaderboard</h1>
    <p class="sub" style="margin-top:8px;">Gesamtpunkte, Siege und letzte Platzierungen.</p>
    <div class="score-rules">
      <span class="score-pill">1. Platz = 3 Punkte</span>
      <span class="score-pill">2. Platz = 2 Punkte</span>
      <span class="score-pill">3. Platz = 1 Punkt</span>
    </div>
  </div>

  <div class="podium fade-in" id="podium" style="animation-delay:0.08s;"></div>

  <div class="leaderboard-layout">
    <div class="glass-card panel-card fade-in" style="animation-delay:0.14s;">
      <div class="panel-title">Rangliste</div>
      <div id="leaderboard"><div class="empty-state">Leaderboard wird geladen...</div></div>
    </div>
    <div class="glass-card panel-card fade-in" style="animation-delay:0.18s;">
      <div class="panel-title">Punkte-Historie</div>
      <div id="history"><div class="empty-state">Noch keine Spiele.</div></div>
    </div>
  </div>

  <div class="actions fade-in" style="animation-delay:0.22s;">
    <a class="btn btn-primary" href="/">Startseite</a>
    <button class="btn btn-ghost" onclick="resetBoard()">Leaderboard resetten</button>
  </div>
</div>
<div id="toast"></div>
<script src="shared.js"></script>
<script>
  initStarfield();
  initThemeToggle();
  loadLeaderboard();

  async function loadLeaderboard() {
    try {
      const data = await apiRequest('/api/leaderboard');
      renderPodium(data.leaderboard || []);
      renderLeaderboard(data.leaderboard || []);
      renderHistory(data.history || []);
    } catch (err) {
      document.getElementById('leaderboard').innerHTML = '<div class="empty-state">Leaderboard konnte nicht geladen werden.</div>';
    }
  }

  function renderPodium(entries) {
    const podium = document.getElementById('podium');
    const top3 = entries.slice(0, 3);
    if (!top3.length) {
      podium.innerHTML = '';
      return;
    }

    const order = top3.length >= 3 ? [top3[1], top3[0], top3[2]] : top3.length === 2 ? [top3[1], top3[0]] : [top3[0]];
    const medals = ['🥇', '🥈', '🥉'];
    const classes = ['first', 'second', 'third'];
    podium.innerHTML = order.map(entry => {
      const rank = top3.indexOf(entry);
      return `
        <div class="podium-card ${classes[rank] || ''}">
          <div class="podium-rank">${medals[rank] || rank + 1}</div>
          ${entry.imagePath ? `<img class="podium-img" src="${escapeHtml(entry.imagePath)}" alt="${escapeHtml(entry.name)}" onerror="this.outerHTML='<div class=\\'podium-img avatar-chip\\'>${avatarHtml(entry.avatar || '🙂')}</div>'">` : `<div class="podium-img avatar-chip" style="font-size:2rem;">${avatarHtml(entry.avatar || '🙂')}</div>`}
          <div class="podium-name">${escapeHtml(entry.name)}</div>
          <div class="podium-points">${entry.points} Punkte · ${entry.wins || 0} Sieg${entry.wins === 1 ? '' : 'e'}</div>
        </div>
      `;
    }).join('');
  }

  function renderLeaderboard(entries) {
    const container = document.getElementById('leaderboard');
    if (!entries.length) {
      container.innerHTML = '<div class="empty-state">Noch keine Punkte. Beendet ein Spiel, dann erscheint hier die Rangliste.</div>';
      return;
    }

    container.innerHTML = entries.map((entry, index) => `
      <div class="leaderboard-row">
        <div class="leaderboard-rank">${index + 1}</div>
        <div class="avatar-chip" style="width:42px;height:42px;font-size:1.35rem;">${avatarHtml(entry.avatar || '🙂')}</div>
        <div>
          <div class="leaderboard-name">${escapeHtml(entry.name)}</div>
          <div class="leaderboard-meta">${entry.wins || 0} Sieg${entry.wins === 1 ? '' : 'e'} · ${entry.games || 0} Top-3 Platzierung${entry.games === 1 ? '' : 'en'}</div>
        </div>
        <div>
          <div class="leaderboard-points">${entry.points}</div>
          <div class="points-label">Punkte</div>
        </div>
      </div>
    `).join('');
  }

  function renderHistory(entries) {
    const container = document.getElementById('history');
    if (!entries.length) {
      container.innerHTML = '<div class="empty-state">Noch keine Spiele.</div>';
      return;
    }
    container.innerHTML = entries.slice(0, 12).map(item => `
      <div class="history-row">
        <div class="history-rank">#${item.rank}</div>
        <div>
          <div class="history-name">${escapeHtml(item.name)}</div>
          <div class="history-date">${new Date(item.date).toLocaleDateString('de-AT')} · ${item.votes} Stimme${item.votes === 1 ? '' : 'n'}</div>
        </div>
        <div class="history-points">+${item.points}</div>
      </div>
    `).join('');
  }

  async function resetBoard() {
    if (!confirm('Leaderboard wirklich zurücksetzen?')) return;
    const key = prompt('Admin-Key eingeben:');
    if (!key) return;

    try {
      await apiRequest('/api/leaderboard/reset', {
        method: 'POST',
        body: JSON.stringify({ key })
      });
      showToast('Leaderboard zurückgesetzt');
      loadLeaderboard();
    } catch (err) {
      showToast('Reset fehlgeschlagen: ' + err.message);
    }
  }
</script>
</body>
</html>
