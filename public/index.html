<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rathering Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }

    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 520px;
      padding: 24px; display: flex;
      flex-direction: column; align-items: center; gap: 28px;
    }

    .hero { text-align: center; width: 100%; }
    .hero .badge { margin-bottom: 18px; }
    .hero .tagline { margin-top: 10px; }

    .card-body { padding: 32px; width: 100%; }

    .panel { display:none; flex-direction:column; gap:16px; }
    .panel.active { display:flex; }

    .steps { display:flex; flex-direction:column; gap:10px; width:100%; }

    .footer-text { font-size: 0.7rem; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

    .code-input {
      text-align: center; letter-spacing: 0.16em;
      font-weight: 600; font-size: 1.05rem; text-transform: uppercase;
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrap">
  <div class="hero fade-in">
    <div class="badge"><div class="badge"><span class="dot"></span>Live Voting Arena</div></div>
    <p style="font-size:1.1rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);margin-bottom:10px;">GIG — Gewinnen ist Geil</p>
    <h1 class="title-hero">Rathering</h1>
    <p class="tagline sub">Upload. Vote. Win.</p>
  </div>

  <div class="glass-card card-body fade-in" style="animation-delay:0.1s;">
    <div class="tabs" style="margin-bottom:24px;">
      <button class="tab active" onclick="switchTab('create')">Spiel erstellen</button>
      <button class="tab"       onclick="switchTab('join')">Beitreten</button>
    </div>

    <div class="panel active" id="panel-create">
      <div class="input-group">
        <label class="label">Dein Name</label>
        <input class="input" id="host-name" type="text" placeholder="z.B. Julius" maxlength="20" autocomplete="off">
      </div>
      <button class="btn btn-primary btn-full" onclick="createGame()">Spiel erstellen →</button>
    </div>

    <div class="panel" id="panel-join">
      <div class="input-group">
        <label class="label">Raum-Code</label>
        <input class="input code-input" id="join-code" type="text" placeholder="ABC123" maxlength="6" autocomplete="off">
      </div>
      <div class="input-group">
        <label class="label">Dein Name</label>
        <input class="input" id="join-name" type="text" placeholder="z.B. Fabian" maxlength="20" autocomplete="off">
      </div>
      <button class="btn btn-primary btn-full" onclick="joinGame()">Beitreten →</button>
    </div>
  </div>

  <div class="steps fade-in" style="animation-delay:0.2s;">
    <div class="step-item"><div class="step-num">1</div><div class="step-text">Spiel erstellen und Code teilen</div></div>
    <div class="step-item"><div class="step-num">2</div><div class="step-text">Alle laden ihr Lieblingsfoto hoch</div></div>
    <div class="step-item"><div class="step-num">3</div><div class="step-text">Abstimmen — wer gewinnt?</div></div>
  </div>

  <span class="footer-text fade-in" style="animation-delay:0.3s;">GIG — Gewinnen ist Geil</span>
</div>
<div id="toast"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="shared.js"></script>
<script>
  initStarfield();
  initThemeToggle();
  const socket = io();

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',(i===0)===(tab==='create')));
    document.getElementById('panel-create').classList.toggle('active', tab==='create');
    document.getElementById('panel-join').classList.toggle('active', tab==='join');
  }

  document.getElementById('host-name').addEventListener('keydown', e => { if(e.key==='Enter') createGame(); });
  document.getElementById('join-name').addEventListener('keydown', e => { if(e.key==='Enter') joinGame(); });
  document.getElementById('join-code').addEventListener('keydown', e => { if(e.key==='Enter') joinGame(); });
  document.getElementById('join-code').addEventListener('input', e => { e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,''); });

  function createGame() {
    const name = document.getElementById('host-name').value.trim();
    if (!name) { showToast('⚠️ Namen eingeben'); return; }
    socket.emit('create_room', { hostName: name });
  }
  function joinGame() {
    const code = document.getElementById('join-code').value.trim().toUpperCase();
    const name = document.getElementById('join-name').value.trim();
    if (!code || code.length < 4) { showToast('⚠️ Code eingeben'); return; }
    if (!name) { showToast('⚠️ Namen eingeben'); return; }
    socket.emit('join_room', { code, playerName: name });
  }

  socket.on('room_created', ({code, hostName}) => { Session.set('role','host'); Session.set('code',code); Session.set('name',hostName); window.location.href='/lobby.html'; });
  socket.on('joined_room', ({code, playerName}) => { Session.set('role','player'); Session.set('code',code); Session.set('name',playerName); window.location.href='/lobby.html'; });
  socket.on('error', msg => showToast('❌ ' + msg));
</script>
</body>
</html>
